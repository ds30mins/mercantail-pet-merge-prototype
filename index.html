<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>Mercantail</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=Nunito+Sans:wght@500;600;700&display=swap" rel="stylesheet"/>
<style>
/* ── RESET & ROOT ── */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  /* Woodoku warm wood palette */
  --wood-light:#e8c07a;    /* light plank */
  --wood-mid:  #c8894a;    /* mid plank */
  --wood-dark: #8b5e2a;    /* dark grain */
  --wood-deep: #5c3a10;    /* deep groove */
  --board-bg:  #b07030;    /* board surface */
  --board-slot:#7a4a1a;    /* empty slot carved */
  --slot-inner:#6a3c10;    /* slot shadow */

  /* Piper warm UI palette */
  --bg:        #f5e6cc;    /* warm cream bg */
  --bg2:       #eedfc0;    /* slightly darker cream */
  --surface:   #fff8ee;    /* card surface */
  --surface2:  #fff3e0;    /* alt card */
  --terra:     #d4622a;    /* terracotta CTA */
  --terra-l:   #e8773e;    /* terracotta light */
  --terra-d:   #9a3a10;    /* terracotta shadow */
  --olive:     #6b8c3a;    /* olive green */
  --olive-l:   #88b04b;    /* olive light */
  --olive-d:   #3a5010;    /* olive dark */
  --honey:     #f0a830;    /* honey gold */
  --honey-d:   #b07010;    /* honey dark */
  --red-soft:  #e84848;
  --red-d:     #a01818;
  --blue-soft: #5b9fd4;

  /* text */
  --ink:       #3a2010;    /* warm dark text */
  --ink2:      #6b4828;    /* medium ink */
  --ink3:      #9a7050;    /* muted ink */
  --on-terra:  #fff8ee;

  --font-h:'Nunito',sans-serif;
  --font-b:'Nunito Sans',sans-serif;
  --r-sm:8px;--r-md:12px;--r-lg:18px;--r-xl:24px;
}

html,body{
  height:100%;
  background:var(--bg2);
  font-family:var(--font-b);
  overflow:hidden; /* outer body locked */
}

/* ── APP SHELL ── */
#app{
  height:100%;
  max-width:430px;
  margin:0 auto;
  background:var(--bg);
  display:flex;
  flex-direction:column;
  position:relative;
  overflow:hidden; /* fixed header/footer outside scroll */
}

/* ── HEADER (fixed, outside scroll) ── */
#header{
  flex-shrink:0;
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 14px 8px;
  background:linear-gradient(180deg,#fff8ee 0%,#f5e6cc 100%);
  border-bottom:2px solid var(--wood-light);
  box-shadow:0 2px 8px rgba(90,40,10,.12);
  z-index:20;
  position:relative;
}
.logo{
  font-family:var(--font-h);font-size:17px;font-weight:900;
  color:var(--terra);letter-spacing:.02em;
  text-shadow:0 1px 0 rgba(255,255,255,.7);
}
.logo span{color:var(--olive);}

.hud-row{display:flex;gap:6px;}
.hud-chip{
  display:flex;align-items:center;gap:5px;
  background:var(--surface);border:1.5px solid var(--wood-light);
  border-radius:20px;padding:4px 10px 4px 5px;
  box-shadow:0 1px 4px rgba(90,40,10,.1);
}
.hud-icon{
  width:22px;height:22px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;font-size:13px;
  flex-shrink:0;
}
.hud-icon.zap{background:linear-gradient(135deg,#7bc8f0,#3a80c0);}
.hud-icon.coin{background:linear-gradient(135deg,var(--honey),var(--honey-d));}
.hud-val{
  font-family:var(--font-h);font-size:13px;font-weight:800;
  color:var(--ink);
}

.hdr-btns{display:flex;gap:6px;}
.btn-shop{
  height:32px;border:none;border-radius:20px;cursor:pointer;
  font-family:var(--font-h);font-size:11px;font-weight:800;
  padding:0 12px;display:flex;align-items:center;gap:4px;
  background:linear-gradient(180deg,var(--terra-l) 0%,var(--terra) 100%);
  border-bottom:3px solid var(--terra-d);color:var(--on-terra);
  box-shadow:0 2px 6px rgba(160,60,20,.3);
  transition:transform .08s;letter-spacing:.03em;
}
.btn-shop:active{transform:scale(0.93) translateY(1px);border-bottom-width:1px;}
.btn-info{
  width:32px;height:32px;border:1.5px solid var(--wood-light);border-radius:50%;
  background:var(--surface);color:var(--ink2);font-size:16px;
  display:flex;align-items:center;justify-content:center;cursor:pointer;
  transition:transform .08s;
}
.btn-info:active{transform:scale(0.9);}

/* ── SCROLL CONTAINER ── */
#scroll-body{
  flex:1;
  overflow-y:auto;
  overflow-x:hidden;
  -webkit-overflow-scrolling:touch;
  padding-bottom:env(safe-area-inset-bottom, 16px);
}
#scroll-body::-webkit-scrollbar{display:none;}

/* ── TAP HINT ── */
.tap-hint{
  width:100%;max-width:360px;
  text-align:center;
  padding:4px 0;
  font-family:var(--font-h);font-size:10px;font-weight:800;
  color:var(--ink3);letter-spacing:.04em;
}

/* ── ORDERS ── */
#orders-section{
  padding:12px 12px 8px;
}
.section-label{
  font-family:var(--font-h);font-size:9px;font-weight:800;
  color:var(--ink3);text-transform:uppercase;letter-spacing:.18em;
  margin-bottom:8px;display:flex;align-items:center;gap:6px;
}
.section-label::after{content:'';flex:1;height:1px;background:var(--wood-light);}

.orders-row{display:flex;gap:8px;}
.order-card{
  flex:1;min-width:0;
  background:var(--surface);
  border:2px solid #e8d0b0;
  border-radius:var(--r-lg);
  border-bottom:3px solid #c8a870;
  padding:8px 5px 7px;
  display:flex;flex-direction:column;align-items:center;gap:4px;
  cursor:pointer;transition:all .3s;position:relative;overflow:hidden;
  box-shadow:0 2px 8px rgba(90,40,10,.08);
}
.order-card.has-item{
  border-color:var(--olive-l);border-bottom-color:var(--olive-d);
  background:#f0f8e8;box-shadow:0 2px 12px rgba(100,160,50,.2);
}
.order-card.completing{
  transform:scale(0) translateY(-20px);opacity:0;pointer-events:none;
}
.order-pet{
  width:34px;height:34px;border-radius:50%;
  background:linear-gradient(135deg,#fff3d8,#ffe0a8);
  border:2px solid var(--wood-light);
  display:flex;align-items:center;justify-content:center;font-size:18px;
  box-shadow:0 2px 4px rgba(90,40,10,.1);
}
.order-name{
  font-family:var(--font-h);font-size:8px;font-weight:800;
  color:var(--ink2);text-align:center;line-height:1.1;
  max-width:68px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}
.order-item-slot{
  width:36px;height:36px;border-radius:var(--r-sm);
  background:var(--bg2);border:2px solid #d8c090;
  display:flex;align-items:center;justify-content:center;font-size:20px;
  box-shadow:inset 0 2px 4px rgba(90,40,10,.1);
}
.order-reward{
  font-family:var(--font-h);font-size:10px;font-weight:900;
  color:var(--honey-d);display:flex;align-items:center;gap:2px;
}
.order-btn{
  width:100%;padding:5px 0;border:none;border-radius:6px;cursor:pointer;
  font-family:var(--font-h);font-size:9px;font-weight:800;
  letter-spacing:.04em;text-transform:uppercase;transition:transform .08s;
}
.order-btn:active{transform:scale(0.93);}
.order-btn.ready{
  background:linear-gradient(180deg,var(--olive-l),var(--olive));
  border-bottom:2px solid var(--olive-d);color:#fff;
}
.order-btn.waiting{background:#e8d8c0;color:#b09070;pointer-events:none;}

/* ── BOARD WRAPPER ── */
#board-wrap{
  padding:4px 12px 10px;
  display:flex;flex-direction:column;align-items:center;gap:6px;
}

/* ── BOARD — Woodoku warm wood ── */
#board{
  width:100%;max-width:360px;
  background:
    repeating-linear-gradient(
      180deg,
      var(--wood-mid) 0px,
      var(--wood-light) 12px,
      var(--wood-mid) 24px,
      var(--wood-dark) 36px
    );
  border-radius:var(--r-xl);
  padding:10px;
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:6px;
  border:3px solid var(--wood-deep);
  box-shadow:
    0 6px 20px rgba(60,30,0,.35),
    inset 0 1px 0 rgba(255,230,180,.3),
    inset 0 -2px 4px rgba(0,0,0,.2);
  position:relative;
}
/* plank screw dots */
#board::before,#board::after{
  content:'';position:absolute;width:10px;height:10px;border-radius:50%;
  background:radial-gradient(circle at 35% 35%,#a07040,#5c3010);
  border:1px solid var(--wood-deep);
  box-shadow:inset 0 1px 2px rgba(0,0,0,.4);
}
#board::before{top:6px;left:6px;}
#board::after{bottom:6px;right:6px;}

/* ── CELLS ── */
.cell{
  aspect-ratio:1;border-radius:var(--r-md);
  display:flex;align-items:center;justify-content:center;
  position:relative;cursor:pointer;
  font-size:clamp(18px,5vw,24px);
  transition:transform .1s,box-shadow .1s;
}
/* empty — carved slot */
.cell.empty{
  background:
    radial-gradient(ellipse at center, var(--slot-inner) 0%, var(--board-slot) 100%);
  box-shadow:inset 0 2px 5px rgba(0,0,0,.45),inset 0 1px 2px rgba(0,0,0,.3);
  border:1px solid rgba(0,0,0,.2);
}
/* filled — cream ivory block sitting in groove */
.cell.filled{
  background:linear-gradient(160deg,#fffaf0 0%,#f5e8d0 100%);
  border:1.5px solid #e0c890;
  border-bottom:4px solid #c0a060;
  border-right:2px solid #d0b070;
  box-shadow:0 3px 7px rgba(90,40,10,.25),inset 0 1px 0 rgba(255,255,255,.9);
  cursor:grab;
}
.cell.filled:active{cursor:grabbing;}
/* producer — darker wood panel with glow */
.cell.producer{
  background:linear-gradient(160deg,var(--wood-mid),var(--wood-dark));
  border:1.5px solid var(--wood-light);
  border-bottom:4px solid var(--wood-deep);
  box-shadow:0 3px 8px rgba(0,0,0,.3);
  cursor:pointer;
}
.cell.producer:active{transform:scale(0.92) translateY(2px);box-shadow:0 1px 3px rgba(0,0,0,.3);}

/* selected ring */
.cell.selected{
  outline:3px solid var(--honey);
  outline-offset:1px;
  box-shadow:0 0 0 5px rgba(240,168,48,.25),0 3px 7px rgba(90,40,10,.25);
}
/* drag feedback */
.cell.dragging{opacity:0.15;}


/* animations */
.cell.merge-pop{animation:merge-pop .35s ease;}
@keyframes merge-pop{
  0%{transform:scale(1)}
  40%{transform:scale(1.22)}
  70%{transform:scale(.92)}
  100%{transform:scale(1)}
}
.cell.wrong-drop{animation:wrong-shake .25s ease;}
@keyframes wrong-shake{
  0%{transform:translateX(0)}
  25%{transform:translateX(-5px)}
  75%{transform:translateX(5px)}
  100%{transform:translateX(0)}
}

/* cell decorations */
.cell-level{
  position:absolute;bottom:2px;right:3px;
  font-family:var(--font-h);font-size:7px;font-weight:900;
  color:rgba(90,40,10,.5);line-height:1;
}
.producer-badge{
  position:absolute;top:3px;right:3px;
  width:14px;height:14px;border-radius:50%;
  background:linear-gradient(135deg,#7bc8f0,#3a80c0);
  border:1.5px solid #fff;
  display:flex;align-items:center;justify-content:center;
  font-size:7px;color:#fff;font-weight:900;
}

/* ── INSPECTOR ── */
#inspector{
  margin:0 12px 10px;
  background:var(--surface);
  border:2px solid #e0c890;
  border-bottom:3px solid #c8a870;
  border-radius:var(--r-xl);
  padding:10px 12px;
  display:flex;align-items:center;gap:10px;
  box-shadow:0 3px 10px rgba(90,40,10,.1);
}
.insp-icon{
  width:46px;height:46px;border-radius:var(--r-md);flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:24px;
  background:var(--bg2);border:2px solid #d8c090;
  box-shadow:inset 0 2px 4px rgba(90,40,10,.08);
  transition:background .2s;
}
.insp-icon.active{
  background:linear-gradient(135deg,#fff8d8,#ffe8a0);
  border-color:var(--honey);
}
.insp-text{flex:1;min-width:0;}
.insp-name{
  font-family:var(--font-h);font-size:13px;font-weight:800;
  color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.insp-sub{font-size:10px;color:var(--ink3);font-weight:600;margin-top:1px;}
.insp-actions{display:flex;gap:6px;align-items:center;flex-shrink:0;}
.insp-btn{
  height:34px;border:none;border-radius:var(--r-sm);cursor:pointer;
  font-family:var(--font-h);font-size:10px;font-weight:800;
  display:flex;align-items:center;gap:4px;padding:0 10px;
  transition:transform .08s;white-space:nowrap;
}
.insp-btn:active{transform:scale(0.9);}
.btn-evo{background:#e8f0ff;border:1.5px solid #b0c8f0;color:var(--blue-soft);}
.btn-sell{background:#fff0f0;border:1.5px solid #f0b0b0;color:var(--red-soft);}




/* ── MODAL ── */
#modal-overlay{
  position:fixed;inset:0;z-index:100;
  background:rgba(60,30,10,.6);backdrop-filter:blur(4px);
  display:flex;align-items:center;justify-content:center;padding:20px;
  opacity:0;pointer-events:none;transition:opacity .2s;
}
#modal-overlay.open{opacity:1;pointer-events:all;}
.modal{
  background:var(--surface);
  border:2px solid #e0c890;
  border-radius:var(--r-xl);
  width:100%;max-width:340px;
  box-shadow:0 16px 48px rgba(60,30,10,.4);
  transform:scale(.92);transition:transform .2s;
  overflow:hidden;
}
#modal-overlay.open .modal{transform:scale(1);}
.modal-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 16px 10px;
  background:linear-gradient(180deg,#fff8ee,#f5e6cc);
  border-bottom:2px solid var(--wood-light);
}
.modal-title{
  font-family:var(--font-h);font-size:14px;font-weight:900;
  color:var(--terra);text-transform:uppercase;letter-spacing:.07em;
}
.modal-close{
  width:28px;height:28px;border-radius:50%;border:1.5px solid #e0c890;
  background:var(--bg2);color:var(--ink2);font-size:14px;
  display:flex;align-items:center;justify-content:center;cursor:pointer;
  transition:transform .08s;
}
.modal-close:active{transform:scale(0.9);}
.modal-body{padding:16px 16px 20px;}

/* evolution chain */
.evo-chain{display:flex;align-items:center;justify-content:center;flex-wrap:wrap;gap:5px;margin-bottom:14px;}
.evo-step{
  width:48px;height:48px;border-radius:var(--r-md);
  display:flex;align-items:center;justify-content:center;font-size:22px;
  background:var(--bg2);border:2px solid #d8c090;opacity:.3;transition:all .2s;
}
.evo-step.done{opacity:.65;border-color:var(--olive-l);}
.evo-step.current{
  opacity:1;border-color:var(--honey);border-width:2.5px;
  background:linear-gradient(135deg,#fff8d8,#ffe8a0);
  box-shadow:0 0 14px rgba(240,168,48,.4);
  transform:scale(1.12);
}
.evo-arrow{font-size:10px;color:var(--ink3);}
.evo-label{
  text-align:center;font-family:var(--font-h);font-size:11px;font-weight:800;
  color:var(--ink2);background:var(--bg2);border-radius:20px;padding:4px 14px;
  border:1.5px solid #d8c090;display:inline-block;
}

/* shop */
.energy-alert{
  display:flex;align-items:center;justify-content:center;gap:6px;
  background:linear-gradient(135deg,#fff3d8,#ffe4a0);
  border:2px solid var(--honey);border-radius:var(--r-md);
  padding:8px 14px;margin-bottom:10px;
  font-family:var(--font-h);font-size:12px;font-weight:900;
  color:var(--terra);letter-spacing:.02em;
}
.shop-gold-bal{
  display:flex;align-items:center;justify-content:center;gap:6px;
  background:var(--bg2);border:1.5px solid #d8c090;
  border-radius:var(--r-md);padding:8px 14px;margin-bottom:12px;
  font-family:var(--font-h);font-size:13px;font-weight:800;color:var(--ink2);
}
.shop-gold-bal span{font-size:18px;font-weight:900;color:var(--honey-d);}
.shop-hero{
  background:linear-gradient(135deg,#fff8d8,#ffe8a0);
  border:2px solid var(--honey);border-radius:var(--r-lg);
  padding:20px;display:flex;flex-direction:column;align-items:center;gap:8px;
  margin-bottom:12px;
}
.shop-zap{font-size:42px;}
.shop-title{font-family:var(--font-h);font-size:15px;font-weight:900;color:var(--ink);}
.shop-sub{font-size:11px;color:var(--ink2);text-align:center;}
.btn-buy{
  width:100%;padding:14px;border:none;border-radius:var(--r-md);cursor:pointer;
  font-family:var(--font-h);font-size:14px;font-weight:900;
  background:linear-gradient(180deg,var(--terra-l),var(--terra));
  border-bottom:4px solid var(--terra-d);color:var(--on-terra);
  display:flex;align-items:center;justify-content:center;gap:8px;
  box-shadow:0 4px 14px rgba(160,60,20,.25);
  transition:transform .08s;text-transform:uppercase;letter-spacing:.05em;
}
.btn-buy:active{transform:scale(0.96) translateY(2px);border-bottom-width:1px;}

/* help */
.help-step{
  display:flex;align-items:center;gap:10px;
  background:var(--bg2);border:1.5px solid #d8c090;
  border-radius:var(--r-md);padding:10px 12px;margin-bottom:8px;
}
.help-num{
  width:24px;height:24px;border-radius:50%;flex-shrink:0;
  background:linear-gradient(135deg,var(--terra-l),var(--terra));
  display:flex;align-items:center;justify-content:center;
  font-family:var(--font-h);font-size:11px;font-weight:900;color:#fff;
}
.help-txt{font-size:12px;font-weight:600;color:var(--ink2);line-height:1.4;}

/* ══════════════════════════════════════
   DEV LOGGER OVERLAY  (invisible during play)
══════════════════════════════════════ */
#dev-logger{
  position:fixed;inset:0;z-index:9999;
  display:flex;flex-direction:column;
  background:rgba(10,8,6,.93);
  font-family:'Courier New',monospace;
  font-size:11px;color:#d4b896;
  transform:translateY(100%);
  transition:transform .3s cubic-bezier(.4,0,.2,1);
  pointer-events:none;
}
#dev-logger.open{transform:translateY(0);pointer-events:all;}
#dev-logger-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 14px 8px;
  background:#1a1208;border-bottom:1px solid #3a2810;
  flex-shrink:0;
}
#dev-logger-title{
  font-size:12px;font-weight:700;color:#f0a830;letter-spacing:.08em;
}
#dev-logger-meta{font-size:10px;color:#9a7850;}
#dev-logger-close{
  background:none;border:1px solid #3a2810;border-radius:4px;
  color:#9a7850;font-size:11px;cursor:pointer;padding:3px 8px;
}
#dev-logger-close:hover{border-color:#f0a830;color:#f0a830;}
#dev-logger-stats{
  display:flex;gap:0;flex-shrink:0;
  background:#120e08;border-bottom:1px solid #2a1e10;
}
.dl-stat{
  flex:1;padding:6px 4px;text-align:center;
  border-right:1px solid #2a1e10;
}
.dl-stat:last-child{border-right:none;}
.dl-stat-val{font-size:14px;font-weight:700;color:#f0a830;}
.dl-stat-lbl{font-size:8px;color:#6a4830;letter-spacing:.06em;text-transform:uppercase;margin-top:1px;}
#dev-log-rows{
  flex:1;overflow-y:auto;padding:6px 0;
}
#dev-log-rows::-webkit-scrollbar{width:4px;}
#dev-log-rows::-webkit-scrollbar-thumb{background:#3a2810;border-radius:2px;}
.dl-row{
  display:grid;
  grid-template-columns:38px 60px 1fr 52px 52px;
  gap:0;padding:3px 10px;
  border-bottom:1px solid #1a1208;
  align-items:center;
}
.dl-row:hover{background:#1a1208;}
.dl-row-num{color:#4a3820;font-size:9px;}
.dl-row-time{color:#9a7850;}
.dl-row-event{color:#d4b896;}
.dl-row-event .event-tag{
  display:inline-block;padding:1px 5px;border-radius:3px;
  font-size:9px;font-weight:700;margin-right:4px;letter-spacing:.04em;
}
.tag-item_spawned{background:#1a3a10;color:#6bc840;}
.tag-item_merged{background:#3a2810;color:#f0a830;}
.tag-order_fulfilled{background:#102030;color:#5b9fd4;}
.tag-shop_opened{background:#2a1020;color:#e84848;}
.tag-energy_refilled{background:#1a2a3a;color:#7bc8f0;}
.tag-session_ended{background:#2a1a10;color:#c8894a;}
.dl-row-e{color:#7bc8f0;text-align:right;}
.dl-row-g{color:#f0a830;text-align:right;}
#dev-logger-footer{
  display:flex;gap:8px;padding:10px 14px;

}

/* ── TOAST ── */
#toast{
  position:fixed;top:68px;left:50%;transform:translateX(-50%) translateY(-8px);
  background:var(--ink);color:var(--wood-light);
  font-family:var(--font-h);font-size:12px;font-weight:800;
  padding:7px 18px;border-radius:20px;
  opacity:0;pointer-events:none;z-index:200;
  transition:all .2s;white-space:nowrap;
  box-shadow:0 4px 14px rgba(60,30,10,.35);
  border:1.5px solid rgba(255,200,120,.3);
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* ── PARTICLES ── */
.spark{
  position:fixed;pointer-events:none;z-index:300;
  width:7px;height:7px;border-radius:50%;
  animation:spark-out .55s ease-out forwards;
}
@keyframes spark-out{
  0%{opacity:1;transform:translate(0,0) scale(1);}
  100%{opacity:0;transform:var(--to) scale(0);}
}
.coin-up{
  position:fixed;pointer-events:none;z-index:300;
  font-family:var(--font-h);font-size:13px;font-weight:900;
  color:var(--honey-d);
  text-shadow:0 1px 3px rgba(255,255,255,.8);
  animation:float-up .9s ease-out forwards;
}
@keyframes float-up{
  0%{opacity:1;transform:translateY(0);}
  100%{opacity:0;transform:translateY(-48px);}
}
</style>
</head>

<script>
/* ══════════════════════════════════════
   DATA
══════════════════════════════════════ */
const TREES = {
  MEATY:  [{id:'m1',e:'🥚',n:'Egg',lv:1},{id:'m2',e:'🍗',n:'Wing',lv:2},{id:'m3',e:'🥩',n:'Beef',lv:3},{id:'m4',e:'🍖',n:'Prime Rib',lv:4},{id:'m5',e:'🥓',n:'Giant Ham',lv:5}],
  SEAFOOD:[{id:'s1',e:'🦐',n:'Shrimp',lv:1},{id:'s2',e:'🐟',n:'Fish',lv:2},{id:'s3',e:'🍣',n:'Sushi',lv:3},{id:'s4',e:'🍤',n:'Tempura',lv:4},{id:'s5',e:'🦞',n:'Lobster',lv:5}],
  GREENS: [{id:'g1',e:'🥬',n:'Leaf',lv:1},{id:'g2',e:'🥦',n:'Broccoli',lv:2},{id:'g3',e:'🥕',n:'Carrot',lv:3},{id:'g4',e:'🥗',n:'Salad',lv:4},{id:'g5',e:'🎃',n:'Pumpkin',lv:5}],
  GRAINS: [{id:'r1',e:'🌾',n:'Seed',lv:1},{id:'r2',e:'🌿',n:'Sprout',lv:2},{id:'r3',e:'🌽',n:'Corn',lv:3},{id:'r4',e:'🍞',n:'Bread',lv:4},{id:'r5',e:'🌻',n:'Sunflower',lv:5}]
};
const PRODUCERS = [
  {id:'pg',n:'Garden Pot',e:'🪴',trees:['GREENS','GRAINS'],isProducer:true},
  {id:'pc',n:'Fresh Cooler',e:'🧊',trees:['MEATY','SEAFOOD'],isProducer:true}
];
const PETS=[
  {n:'Grumpy Bulldog',e:'🐶'},{n:'Chic Cat',e:'🐱'},{n:'Happy Bunny',e:'🐰'},
  {n:'Singing Bird',e:'🐦'},{n:'Slow Turtle',e:'🐢'},{n:'Lucky Duck',e:'🦆'},
  {n:'Wild Horse',e:'🐴'},{n:'Tiny Hamster',e:'🐹'}
];

const ROWS=6,COLS=5,MAX_E=20;

/* ── STATE ── */
let board = Array(ROWS*COLS).fill(null);
board[25]={...PRODUCERS[0],iid:uid()};
board[29]={...PRODUCERS[1],iid:uid()};
let energy=MAX_E, gold=250;
let orders=[rndOrder(),rndOrder(),rndOrder()];
let selIdx=null;

function uid(){return Math.random().toString(36).slice(2);}
function allItems(){return Object.values(TREES).flat();}
function itemById(id){return allItems().find(x=>x.id===id);}
function treeKeyOf(id){return Object.entries(TREES).find(([,arr])=>arr.find(x=>x.id===id))?.[0];}
function rndOrder(){
  const pet=PETS[Math.floor(Math.random()*PETS.length)];
  const tKey=Object.keys(TREES)[Math.floor(Math.random()*4)];
  const li=Math.floor(Math.random()*4);
  const item=TREES[tKey][li];
  return{id:uid(),petE:pet.e,petN:pet.n,reqId:item.id,reward:(li+1)*25+Math.floor(Math.random()*10),completing:false};
}

/* ══════════════════════════════════════
   RENDER
══════════════════════════════════════ */
function render(){
  document.getElementById('energy-val').textContent=energy+'/'+MAX_E;
  document.getElementById('gold-val').textContent=gold;
  renderOrders(); renderBoard(); renderInspector();
}

function renderOrders(){
  const row=document.getElementById('orders-row');
  row.innerHTML='';
  orders.forEach(o=>{
    const ri=itemById(o.reqId);
    const has=board.some(c=>c&&!c.isProducer&&c.id===o.reqId);
    const card=document.createElement('div');
    card.className='order-card'+(has?' has-item':'')+(o.completing?' completing':'');
    card.innerHTML=`
      <div class="order-pet">${o.petE}</div>
      <div class="order-name">${o.petN.split(' ').slice(-1)[0]}</div>
      <div class="order-item-slot">${ri?.e||'?'}</div>
      <div class="order-reward">🪙${o.reward}g</div>
      <button class="order-btn ${has?'ready':'waiting'}" data-oid="${o.id}">${has?'Deliver!':'Seeking…'}</button>
    `;
    if(has) card.querySelector('button').addEventListener('click',()=>deliverOrder(o.id));
    row.appendChild(card);
  });
}

function renderBoard(){
  const boardEl=document.getElementById('board');
  boardEl.innerHTML='';
  board.forEach((cell,idx)=>{
    const div=document.createElement('div');
    let cls='cell ';
    if(!cell) cls+='empty';
    else if(cell.isProducer) cls+='producer';
    else cls+='filled';
    if(selIdx===idx) cls+=' selected';
    div.className=cls.trim();
    div.dataset.idx=idx;

    if(cell){
      const span=document.createElement('span');
      span.textContent=cell.e;
      span.style.cssText='pointer-events:none;user-select:none;-webkit-user-select:none;';
      div.appendChild(span);
      if(cell.isProducer){
        const badge=document.createElement('div');
        badge.className='producer-badge';badge.textContent='⚡';
        badge.style.pointerEvents='none';
        div.appendChild(badge);
      } else {
        const lv=document.createElement('div');
        lv.className='cell-level';lv.textContent='Lv'+cell.lv;
        lv.style.pointerEvents='none';
        div.appendChild(lv);
      }
    }

    // Unified tap handler — fires on touchend (mobile) and click (desktop)
    // Using touchend prevents the OS text-selection / emoji picker on long-press
    let touchMoved=false;
    div.addEventListener('touchstart',()=>{touchMoved=false;},{passive:true});
    div.addEventListener('touchmove',()=>{touchMoved=true;},{passive:true});
    div.addEventListener('touchend',(e)=>{
      if(touchMoved) return; // was a scroll, ignore
      e.preventDefault(); // stops ghost click that follows touchend
      handleTap(idx);
    });
    // Desktop click (no touch involved)
    div.addEventListener('click',(e)=>{
      // If this device fired a touchend already, the click is a ghost — skip it
      if(e.sourceCapabilities&&!e.sourceCapabilities.firesTouchEvents) handleTap(idx);
      else if(!('ontouchstart' in window)) handleTap(idx);
    });

    boardEl.appendChild(div);
  });
}

function renderInspector(){
  const item=selIdx!==null?board[selIdx]:null;
  const icon=document.getElementById('insp-icon');
  const name=document.getElementById('insp-name');
  const sub=document.getElementById('insp-sub');
  const acts=document.getElementById('insp-actions');
  if(item){
    icon.textContent=item.e; icon.className='insp-icon active';
    name.textContent=item.n||item.name;
    if(item.isProducer){
      sub.textContent='Generator · Tap to produce';acts.innerHTML='';
    } else {
      const tKey=item.tree||treeKeyOf(item.id);
      sub.textContent=`Lv${item.lv} · ${tKey}`;
      acts.innerHTML=`
        <button class="insp-btn btn-evo" onclick="openModal('evo')">🌱 Path</button>
        <button class="insp-btn btn-sell" onclick="sellItem()">💰 ${item.lv}g</button>
      `;
    }
  } else {
    icon.textContent='📦';icon.className='insp-icon';
    name.textContent='Tap a producer to start';
    sub.textContent='Tap to select · Tap same item to merge';
    acts.innerHTML='';
  }
}

/* ══════════════════════════════════════
   GAME LOGIC
══════════════════════════════════════ */
function handleTap(idx){
  const cell=board[idx];

  // Tap a producer → produce
  if(cell?.isProducer){ produceItem(idx); return; }

  // Nothing selected yet → select this cell (or deselect if tapping same)
  if(selIdx===null){
    selIdx = cell ? idx : null;
    renderBoard(); renderInspector(); return;
  }

  // Tapping the already-selected cell → deselect
  if(selIdx===idx){
    selIdx=null; renderBoard(); renderInspector(); return;
  }

  const src=board[selIdx];

  // Tapping an empty cell with something selected → move
  if(!cell && src && !src.isProducer){
    doMove(selIdx, idx); return;
  }

  // Tapping a filled cell with something selected → try merge, else swap selection
  if(cell && !cell.isProducer && src && !src.isProducer){
    if(src.id===cell.id){
      doMerge(selIdx, idx);
    } else {
      // Different item — shift selection to the new cell
      selIdx=idx; renderBoard(); renderInspector();
    }
    return;
  }

  // Fallback: just select new cell
  selIdx = cell ? idx : null;
  renderBoard(); renderInspector();
}

function produceItem(idx){
  if(energy<=0){ openModal('shop', true); return; }
  const empty=board.findIndex(c=>c===null);
  if(empty===-1){toast('🪵 Board is full!');return;}
  const p=board[idx];
  const tKey=p.trees[Math.floor(Math.random()*p.trees.length)];
  board[empty]={...TREES[tKey][0],tree:tKey,iid:uid()};
  energy--;selIdx=empty;
  render();animPop(empty);
}

function doMerge(srcIdx,tgtIdx){
  const src=board[srcIdx];
  const tKey=src.tree||treeKeyOf(src.id);
  const tree=TREES[tKey];
  const ci=tree.findIndex(x=>x.id===src.id);
  if(ci<tree.length-1){
    board[tgtIdx]={...tree[ci+1],tree:tKey,iid:uid()};
    board[srcIdx]=null;
    selIdx=tgtIdx;
    render();
    animPop(tgtIdx);
    sparkBurst(tgtIdx);
    toast('✨ Merged to '+tree[ci+1].n+'!');
    return true;
  }
  toast('Already at max level!'); selIdx=null; render();
  return false;
}

function doMove(srcIdx,tgtIdx){
  board[tgtIdx]=board[srcIdx];board[srcIdx]=null;
  selIdx=tgtIdx;render();
}

function sellItem(){
  if(selIdx===null)return;
  const item=board[selIdx];
  if(!item||item.isProducer)return;
  floatCoin(selIdx,item.lv);
  gold+=item.lv;board[selIdx]=null;selIdx=null;
  render();toast('Sold for '+item.lv+'g!');
}

function deliverOrder(oid){
  const order=orders.find(o=>o.id===oid);if(!order)return;
  const itemIdx=board.findIndex(c=>c&&!c.isProducer&&c.id===order.reqId);
  if(itemIdx===-1){toast('Item not on board!');return;}
  orders=orders.map(o=>o.id===oid?{...o,completing:true}:o);
  renderOrders();
  setTimeout(()=>{
    board[itemIdx]=null;gold+=order.reward;
    orders=orders.map(o=>o.id===oid?rndOrder():o);
    render();sparkBurstCenter();
    toast('🎉 Delivered! +'+order.reward+'g');
  },480);
}

/* no drag & drop — this is a tap-to-merge game */

/* ══════════════════════════════════════
   MODALS
══════════════════════════════════════ */
function openModal(type, outOfEnergy=false){
  const overlay=document.getElementById('modal-overlay');
  const title=document.getElementById('modal-title');
  const body=document.getElementById('modal-body');
  overlay.classList.add('open');
  if(type==='help'){
    title.textContent='How to Play';
    body.innerHTML=[
      ['Tap 🪴 or 🧊 to spawn ingredients','⚡ costs 1 energy'],
      ['Tap an item to select it','A gold ring appears around it'],
      ['Tap a matching item to merge','They evolve to a higher level!'],
      ['Deliver items to earn Gold','Tap Deliver when it lights up 🟢']
    ].map(([t,s],i)=>`
      <div class="help-step">
        <div class="help-num">${i+1}</div>
        <div class="help-txt"><strong>${t}</strong><br><span style="opacity:.7">${s}</span></div>
      </div>`).join('');
  }
  else if(type==='evo'){
    const item=selIdx!==null?board[selIdx]:null;
    if(!item||item.isProducer){closeModal();return;}
    const tKey=item.tree||treeKeyOf(item.id);
    const tree=TREES[tKey];
    title.textContent='Evolution Path';
    const steps=tree.map((s,i)=>{
      const cls=s.id===item.id?'current':s.lv<item.lv?'done':'';
      return `<div class="evo-step ${cls}">${s.e}</div>${i<tree.length-1?'<div class="evo-arrow">▸</div>':''}`;
    }).join('');
    body.innerHTML=`
      <div class="evo-chain">${steps}</div>
      <div style="text-align:center;margin-top:4px">
        <div class="evo-label">${item.n} · Lv${item.lv} · ${tKey}</div>
      </div>`;
  }
  else if(type==='shop'){
    title.textContent='Shop';
    const alertHtml = outOfEnergy
      ? `<div class="energy-alert">⚡ Out of Energy! Refill to keep going.</div>`
      : '';
    body.innerHTML=`
      ${alertHtml}
      <div class="shop-gold-bal">🪙 Your balance: <span id="modal-gold">${gold}</span> gold</div>
      <div class="shop-hero">
        <div class="shop-zap">⚡</div>
        <div class="shop-title">Energy Refill</div>
        <div class="shop-sub">Restore +10 energy to keep cooking!</div>
      </div>
      <button class="btn-buy" onclick="buyEnergy()">🪙 100 Gold — Refill Energy</button>`;
  }
}
function closeModal(){document.getElementById('modal-overlay').classList.remove('open');}
function overlayClick(e){if(e.target===document.getElementById('modal-overlay'))closeModal();}
function buyEnergy(){
  if(gold<100){toast('Need 100 Gold! 🪙');return;}
  gold-=100;energy=Math.min(energy+10,MAX_E);
  closeModal();render();toast('+10 Energy! ⚡');
}

/* ══════════════════════════════════════
   ANIMATIONS & FX
══════════════════════════════════════ */
function getCellEl(idx){return document.querySelectorAll('.cell')[idx];}

function animPop(idx){
  const c=getCellEl(idx);if(!c)return;
  c.classList.remove('merge-pop');void c.offsetWidth;
  c.classList.add('merge-pop');
  c.addEventListener('animationend',()=>c.classList.remove('merge-pop'),{once:true});
}
function animWrong(idx){
  const c=getCellEl(idx);if(!c)return;
  c.classList.remove('wrong-drop');void c.offsetWidth;
  c.classList.add('wrong-drop');
  c.addEventListener('animationend',()=>c.classList.remove('wrong-drop'),{once:true});
}

function sparkBurst(idx){
  const c=getCellEl(idx);if(!c)return;
  const r=c.getBoundingClientRect();
  spawnSparks(r.left+r.width/2,r.top+r.height/2,10);
}
function sparkBurstCenter(){
  spawnSparks(window.innerWidth/2,window.innerHeight*0.35,18);
}
function spawnSparks(cx,cy,count){
  const cols=['#f0a830','#d4622a','#6b8c3a','#5b9fd4','#e84848','#c8894a'];
  for(let i=0;i<count;i++){
    const s=document.createElement('div');
    s.className='spark';
    const angle=Math.random()*360;
    const dist=28+Math.random()*44;
    const dx=Math.cos(angle*Math.PI/180)*dist;
    const dy=Math.sin(angle*Math.PI/180)*dist;
    s.style.cssText=`left:${cx}px;top:${cy}px;background:${cols[i%cols.length]};--to:translate(${dx}px,${dy}px);`;
    document.body.appendChild(s);
    setTimeout(()=>s.remove(),650);
  }
}

function floatCoin(idx,amt){
  const c=getCellEl(idx);if(!c)return;
  const r=c.getBoundingClientRect();
  const f=document.createElement('div');
  f.className='coin-up';f.textContent='+'+amt+'g 🪙';
  f.style.cssText=`left:${r.left+r.width/2}px;top:${r.top}px;transform:translateX(-50%)`;
  document.body.appendChild(f);
  setTimeout(()=>f.remove(),1000);
}

/* ── TOAST ── */
let toastT;
function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg;el.classList.add('show');
  clearTimeout(toastT);
  toastT=setTimeout(()=>el.classList.remove('show'),2200);
}

/* ══════════════════════════════════════
   PLAYTESTER LOGGER
   Hooks into game functions, auto-reads state,
   exports CSV matching the Mercantail Playtest Tracker schema.
══════════════════════════════════════ */
const Logger = (function(){
  /* ══════════════════════════════════════
     GOOGLE SHEETS CONFIG
     Paste your Apps Script Web App URL below.
     Leave empty string to use CSV-only mode.
  ══════════════════════════════════════ */
  const SHEETS_WEBHOOK_URL = 'https://script.google.com/macros/s/AKfycbwJeKK9vPN5q0c-Gg65wVcoyPYeGoQ6MjoOoUthpJxWT0Uyg3bjuZ5ECcVSLciA6TGx/exec'; // ← PASTE YOUR DEPLOYED WEB APP URL HERE

  /* ── Session / Player IDs ── */
  const _sNum = ((+sessionStorage.getItem('_mt_snum')||0) + 1);
  sessionStorage.setItem('_mt_snum', _sNum);
  const SESSION_ID = 'S' + String(_sNum).padStart(2,'0');
  const PLAYER_ID  = 'P' + String(_sNum).padStart(2,'0');

  /* ── Timer ── */
  const _t0 = Date.now();
  function elapsed(){ return ((Date.now() - _t0) / 1000).toFixed(1); }
  function fmtTime(s){ const sec=Math.floor(s); return Math.floor(sec/60)+':'+String(sec%60).padStart(2,'0'); }

  /* ── Log store ── */
  // Each row matches the tracker schema columns exactly
  // [Session, Player, Timestamp(s), Event Type, Item Path, Tier Before, Tier After,
  //  Energy Before, Energy After, Gold Before, Gold After, Order Slot, Churn Signal?, Shop Voluntary?, Notes]
  const _rows = [];
  let _stats = {spawned:0,merged:0,orders:0,shopOpened:0,energyRefilled:0};

  /* ── Send a row to Google Sheets via Apps Script webhook ── */
  // Uses navigator.sendBeacon for fire-and-forget (works even on page unload).
  // Falls back to fetch() if Beacon isn't supported.
  // Completely silent on failure — never interrupts gameplay.
  function _sendToSheets(row, rowIndex){
    if(!SHEETS_WEBHOOK_URL) return;
    const payload = JSON.stringify({
      autoId:       rowIndex,
      session:      row.session,
      player:       row.player,
      timestamp:    row.timestamp,
      event:        row.event,
      itemPath:     row.itemPath,
      tierBefore:   row.tierBefore,
      tierAfter:    row.tierAfter,
      energyBefore: row.energyBefore,
      energyAfter:  row.energyAfter,
      goldBefore:   row.goldBefore,
      goldAfter:    row.goldAfter,
      orderSlot:    row.orderSlot,
      churnSignal:  row.churnSignal,
      shopVoluntary:row.shopVoluntary,
      notes:        row.notes
    });
    try {
      // Apps Script doesn't support custom CORS headers on responses,
      // so we use no-cors mode which skips the preflight entirely.
      // sendBeacon also skips preflight and works on page unload.
      if(navigator.sendBeacon){
        const blob = new Blob([payload], {type:'text/plain'});
        navigator.sendBeacon(SHEETS_WEBHOOK_URL, blob);
      } else {
        fetch(SHEETS_WEBHOOK_URL, {
          method:'POST',
          body: payload,
          mode: 'no-cors',   // ← skips CORS preflight; response is opaque but row still writes
          keepalive: true
        }).catch(()=>{});
      }
    } catch(e){}
  }

  /* ── Core log function ── */
  function log(eventType, extra={}){
    const ts = parseFloat(elapsed());
    const row = {
      session:    SESSION_ID,
      player:     PLAYER_ID,
      timestamp:  ts,
      event:      eventType,
      itemPath:   extra.itemPath  || '',
      tierBefore: extra.tierBefore != null ? extra.tierBefore : '',
      tierAfter:  extra.tierAfter  != null ? extra.tierAfter  : '',
      energyBefore: extra.energyBefore != null ? extra.energyBefore : '',
      energyAfter:  extra.energyAfter  != null ? extra.energyAfter  : '',
      goldBefore: extra.goldBefore != null ? extra.goldBefore : '',
      goldAfter:  extra.goldAfter  != null ? extra.goldAfter  : '',
      orderSlot:  extra.orderSlot  != null ? extra.orderSlot  : '',
      churnSignal: extra.churnSignal || '',
      shopVoluntary: extra.shopVoluntary != null ? extra.shopVoluntary : '',
      notes:      extra.notes || ''
    };
    _rows.push(row);
    _sendToSheets(row, _rows.length);
    // update counters
    if(eventType==='item_spawned')    _stats.spawned++;
    if(eventType==='item_merged')     _stats.merged++;
    if(eventType==='order_fulfilled') _stats.orders++;
    if(eventType==='shop_opened')     _stats.shopOpened++;
    if(eventType==='energy_refilled') _stats.energyRefilled++;

    _appendRowUI(row, _rows.length);
    _updateStats();
  }

  /* ── UI update helpers ── */
  function _updateStats(){
    const ts = parseFloat(elapsed());
    const el = id=>document.getElementById(id);
    el('dls-time').textContent    = fmtTime(ts);
    el('dls-events').textContent  = _rows.length;
    el('dls-spawned').textContent = _stats.spawned;
    el('dls-merged').textContent  = _stats.merged;
    el('dls-orders').textContent  = _stats.orders;
    document.getElementById('dev-logger-meta').textContent =
      SESSION_ID + ' · ' + PLAYER_ID + ' · ' + _rows.length + ' events';
    const syncEl = document.getElementById('dl-sync-status');
    if(syncEl) syncEl.textContent = SHEETS_WEBHOOK_URL
      ? '🟢 Syncing to Google Sheets'
      : '⚪ CSV-only mode — no webhook configured';
    document.getElementById('dl-session-display').textContent =
      'Session '+SESSION_ID+' · Player '+PLAYER_ID;
  }

  function _appendRowUI(row, idx){
    const wrap = document.getElementById('dev-log-rows');
    if(!wrap) return;
    const div = document.createElement('div');
    div.className = 'dl-row';
    const ei = row.energyAfter !== '' ? row.energyAfter : (row.energyBefore !== '' ? row.energyBefore : '—');
    const gi = row.goldAfter   !== '' ? row.goldAfter   : (row.goldBefore   !== '' ? row.goldBefore   : '—');
    div.innerHTML =
      `<div class="dl-row-num">#${idx}</div>`+
      `<div class="dl-row-time">${row.timestamp}s</div>`+
      `<div class="dl-row-event"><span class="event-tag tag-${row.event}">${row.event.replace('_',' ')}</span>`+
        (row.itemPath?`<span style="color:#6a4830">${row.itemPath}</span>`:``)+`</div>`+
      `<div class="dl-row-e">⚡${ei}</div>`+
      `<div class="dl-row-g">🪙${gi}</div>`;
    wrap.appendChild(div);
    wrap.scrollTop = wrap.scrollHeight;
  }

  /* ── CSV export ── */
  function downloadCSV(){
    const HEADERS = [
      'Auto ID','Session','Player','Timestamp (seconds)',
      'Event Type','Item Path','Tier Before','Tier After',
      'Energy Before','Energy After','Gold Before','Gold After',
      'Order Slot','Churn Signal?','Shop Voluntary?','Qualitative Notes'
    ];
    const escape = v => {
      const s = String(v==null?'':v);
      return s.includes(',') || s.includes('"') || s.includes('\n')
        ? '"'+s.replace(/"/g,'""')+'"' : s;
    };
    const lines = [HEADERS.join(',')];
    _rows.forEach((r,i)=>{
      lines.push([
        i+1, r.session, r.player, r.timestamp,
        r.event, r.itemPath, r.tierBefore, r.tierAfter,
        r.energyBefore, r.energyAfter, r.goldBefore, r.goldAfter,
        r.orderSlot, r.churnSignal, r.shopVoluntary, r.notes
      ].map(escape).join(','));
    });
    const blob = new Blob([lines.join('\r\n')], {type:'text/csv'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `mercantail_${SESSION_ID}_${Date.now()}.csv`;
    a.click();
  }

  /* ── Toggle overlay ── */
  let _open = false;
  function toggle(){
    _open = !_open;
    document.getElementById('dev-logger').classList.toggle('open', _open);
    if(_open) _updateStats();
  }
  function close(){ _open=false; document.getElementById('dev-logger').classList.remove('open'); }

  /* ── Wire up UI buttons ── */
  document.addEventListener('DOMContentLoaded', ()=>{
    document.getElementById('dev-logger-close').addEventListener('click', close);
    document.getElementById('dl-btn-csv').addEventListener('click', downloadCSV);
    document.getElementById('dl-btn-clear').addEventListener('click', ()=>{
      _rows.length=0;
      Object.keys(_stats).forEach(k=>_stats[k]=0);
      document.getElementById('dev-log-rows').innerHTML='';
      _updateStats();
    });
    _updateStats();
  });

  /* ── Logo long-press / double-tap trigger ── */
  (function setupTrigger(){
    let _pressTimer=null, _lastTap=0;
    const zone = document.getElementById('logo-tap-zone');
    if(!zone) return;

    // Long press (500ms) — works great on mobile
    zone.addEventListener('touchstart', e=>{
      _pressTimer = setTimeout(()=>{ e.preventDefault(); toggle(); }, 500);
    }, {passive:false});
    zone.addEventListener('touchend',  ()=>clearTimeout(_pressTimer));
    zone.addEventListener('touchmove', ()=>clearTimeout(_pressTimer));

    // Double-tap fallback (desktop + fast mobile tap)
    zone.addEventListener('click', ()=>{
      const now = Date.now();
      if(now - _lastTap < 350) toggle();
      _lastTap = now;
    });
  })();

  /* ── Kick off live stats timer ── */
  setInterval(_updateStats, 1000);

  return { log, SESSION_ID, PLAYER_ID, elapsed, toggle };
})();

/* ══════════════════════════════════════
   INSTRUMENT GAME FUNCTIONS
   Wrap originals — Logger fires, then original runs.
   All energy/gold reads happen at call-time from live state.
══════════════════════════════════════ */

/* 1. produceItem → item_spawned */
const _orig_produceItem = produceItem;
produceItem = function(idx){
  const eBefore = energy, gBefore = gold;
  _orig_produceItem(idx);
  // Only log if energy actually changed (i.e. spawn succeeded)
  if(energy < eBefore){
    const spawned = board.find((c,i)=>c&&!c.isProducer&&i!==idx&&board[i]);
    // find most recently placed item (non-producer, non-null)
    const newCell = (() => {
      // energy decreased means spawn happened; find the new item
      // We compare before/after: new item is the one that wasn't there before
      // Simple approach: the empty slot that got filled = selIdx
      return selIdx !== null ? board[selIdx] : null;
    })();
    Logger.log('item_spawned', {
      itemPath: newCell ? (newCell.tree||'?')+' > Lv1 ('+newCell.n+')' : '',
      tierBefore: '',
      tierAfter: newCell ? newCell.lv : 1,
      energyBefore: eBefore,
      energyAfter: energy,
      goldBefore: gBefore,
      goldAfter: gold
    });
  }
};

/* 2. doMerge → item_merged */
const _orig_doMerge = doMerge;
doMerge = function(srcIdx, tgtIdx){
  const src = board[srcIdx];
  const tKey = src ? (src.tree || treeKeyOf(src.id)) : '?';
  const tierBefore = src ? src.lv : '';
  const eBefore = energy, gBefore = gold;
  const result = _orig_doMerge(srcIdx, tgtIdx);
  if(result !== false){
    const merged = board[tgtIdx];
    Logger.log('item_merged', {
      itemPath: tKey + ' > Lv' + tierBefore + ' → Lv' + (merged ? merged.lv : (tierBefore+1)),
      tierBefore: tierBefore,
      tierAfter: merged ? merged.lv : (tierBefore ? tierBefore+1 : ''),
      energyBefore: eBefore,
      energyAfter: energy,
      goldBefore: gBefore,
      goldAfter: gold
    });
  }
  return result;
};

/* 3. deliverOrder → order_fulfilled */
const _orig_deliverOrder = deliverOrder;
deliverOrder = function(oid){
  const order = orders.find(o=>o.id===oid);
  const slotIdx = orders.indexOf(order) + 1;
  const eBefore = energy, gBefore = gold;
  _orig_deliverOrder(oid);
  // Log after the timeout fires (order.reward added to gold)
  // We schedule it slightly after the existing 480ms timeout
  setTimeout(()=>{
    Logger.log('order_fulfilled', {
      itemPath: order ? (itemById(order.reqId)?.n||'') : '',
      tierBefore: order ? (itemById(order.reqId)?.lv||'') : '',
      tierAfter: '',
      energyBefore: eBefore,
      energyAfter: energy,
      goldBefore: gBefore,
      goldAfter: gold,
      orderSlot: slotIdx
    });
  }, 500);
};

/* 4. openModal → shop_opened */
const _orig_openModal = openModal;
openModal = function(type, outOfEnergy=false){
  const eBefore = energy, gBefore = gold;
  _orig_openModal(type, outOfEnergy);
  if(type === 'shop'){
    Logger.log('shop_opened', {
      energyBefore: eBefore,
      energyAfter: energy,
      goldBefore: gBefore,
      goldAfter: gold,
      shopVoluntary: outOfEnergy ? 'No' : 'Yes',
      churnSignal: (energy <= 0) ? 'Y' : ''
    });
  }
};

/* 5. buyEnergy → energy_refilled */
const _orig_buyEnergy = buyEnergy;
buyEnergy = function(){
  const eBefore = energy, gBefore = gold;
  _orig_buyEnergy();
  if(energy > eBefore){ // only fires if purchase succeeded
    Logger.log('energy_refilled', {
      energyBefore: eBefore,
      energyAfter: energy,
      goldBefore: gBefore,
      goldAfter: gold
    });
  }
};

/* 6. session_ended — fires on page unload */
window.addEventListener('beforeunload', ()=>{
  Logger.log('session_ended', {
    energyBefore: energy,
    energyAfter: energy,
    goldBefore: gold,
    goldAfter: gold,
    notes: 'page unload at '+Logger.elapsed()+'s'
  });
});

/* ── GO ── */
render();
</script>
